<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J&T Mỹ Tho - Excel Auto Tool</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --jt-red: #e62117; --jt-dark: #c41a12; --bg-gray: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-gray); margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; }
        .container { background: white; width: 100%; max-width: 600px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); margin-top: 20px; text-align: center; }
        
        h1 { color: var(--jt-red); margin: 0; font-size: 26px; font-weight: 800; }
        .version { font-size: 12px; color: #999; text-transform: uppercase; margin-bottom: 20px; font-weight: bold; }

        #login-section { padding: 40px 0; }
        #tool-section { display: none; }

        .user-badge { background: #fff3f3; color: var(--jt-red); padding: 12px; border-radius: 12px; font-weight: bold; font-size: 14px; margin-bottom: 20px; border: 1px solid #ffcccc; display: flex; justify-content: space-between; align-items: center; }
        
        /* Excel Upload Box */
        .upload-box { border: 2px dashed #cbd5e0; padding: 40px 20px; border-radius: 15px; background: #fafafa; cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
        .upload-box:hover { border-color: var(--jt-red); background: #fff1f0; }
        .upload-box i { font-size: 40px; display: block; margin-bottom: 10px; }
        #file-input { display: none; }

        .btn-reset { background: #636e72; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-top: 10px; }

        /* Results */
        .result-area { margin-top: 30px; text-align: left; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { color: #99aab5; font-size: 11px; text-transform: uppercase; padding: 0 15px; }
        tr.item-row td { background: white; padding: 15px; border: 1px solid #f1f1f1; }
        tr.item-row td:first-child { border-radius: 12px 0 0 12px; }
        tr.item-row td:last-child { border-radius: 0 12px 12px 0; }
        
        .code-text { font-family: monospace; font-weight: bold; color: #2d3436; }
        .shipper-text { color: var(--jt-red); font-weight: 800; }
        .loading { font-size: 13px; color: #888; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>J&T EXPRESS</h1>
        <div class="version">Hệ thống xử lý Excel Mỹ Tho</div>
    </div>

    <div id="login-section">
        <p style="color:#666">Đăng nhập để sử dụng tính năng nạp Excel</p>
        <center>
            <div id="g_id_onload"
                 data-client_id="850864834737-40v7posjfcq42avv71jv6f38u5tip2fq.apps.googleusercontent.com"
                 data-callback="handleCredentialResponse">
            </div>
            <div class="g_id_signin" data-type="standard" data-shape="pill"></div>
        </center>
    </div>

    <div id="tool-section">
        <div class="user-badge">
            <span id="user-email">...</span>
            <span style="font-size:11px; background:var(--jt-red); color:white; padding:2px 8px; border-radius:10px;" id="user-expiry">Hạn: --/--</span>
        </div>
        
        <div class="upload-box" onclick="document.getElementById('file-input').click()">
            <span>📂 Nhấn vào đây để chọn file Excel từ JMS</span>
            <input type="file" id="file-input" accept=".xlsx, .xls, .csv" onchange="handleFile(event)">
        </div>
        <p id="file-name" style="font-size: 13px; color: #2ecc71; font-weight: bold;"></p>
        <div id="sync-msg" class="loading">Đang tải dữ liệu Shipper...</div>

        <div class="result-area" id="result-table"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwukwW0tEYoW3j9RTKnkRXnOdNwkA9Yi6RdpdEBE7IjAbzOtswd-dVP1lGJaRNOXIwA/exec";
    let SHIPPER_DB = {};

    function handleCredentialResponse(response) {
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('tool-section').style.display = 'block';
        document.getElementById('user-email').innerText = payload.email;

        fetch(`${SCRIPT_URL}?action=checkAuth&email=${payload.email}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('user-expiry').innerText = `Hạn: ${new Date(data.expiry).toLocaleDateString('vi-VN')}`;
                syncData();
            });
    }

    function syncData() {
        document.getElementById('sync-msg').style.display = 'block';
        fetch(`${SCRIPT_URL}?action=getDanhMuc`)
            .then(res => res.json())
            .then(data => {
                SHIPPER_DB = data;
                document.getElementById('sync-msg').innerText = "✅ Đã sẵn sàng xử lý file!";
            });
    }

    function handleFile(e) {
        const file = e.target.files[0];
        if (!file) return;
        document.getElementById('file-name').innerText = "📄 Đang đọc file: " + file.name;

        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            const jsonData = XLSX.utils.sheet_to_json(firstSheet, {header: 1});
            
            processExcelData(jsonData);
        };
        reader.readAsArrayBuffer(file);
    }

    function processExcelData(data) {
        let html = `<table><thead><tr><th>Mã Đơn</th><th>Khu Vực</th><th>Shipper</th></tr></thead><tbody>`;
        
        // Duyệt từng dòng trong Excel (Bỏ qua tiêu đề dòng 1)
        data.slice(1).forEach(row => {
            // JMS thường để mã vận đơn ở cột 0 hoặc 1. Tui sẽ quét tìm ô nào có độ dài > 10 ký tự
            let billCode = row.find(cell => cell && cell.toString().length >= 10);
            
            if (billCode) {
                let codeStr = billCode.toString().trim();
                let d3 = codeStr.slice(-3);
                let info = SHIPPER_DB[d3] || { khu: "Mã lạ", ten: "Chưa phân" };

                html += `<tr class="item-row">
                    <td class="code-text">...${codeStr.slice(-6)}</td>
                    <td style="color:#636e72">${info.khu}</td>
                    <td class="shipper-text">${info.ten}</td>
                </tr>`;
            }
        });

        html += `</tbody></table>`;
        document.getElementById('result-table').innerHTML = html;
    }
</script>

</body>
</html>
