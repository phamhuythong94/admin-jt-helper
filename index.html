<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J&T LOGISTICS ENTERPRISE 2025</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --jt-red: #e62117; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 850px; padding: 30px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); text-align: center; }
        
        /* Header & User */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo h1 { color: var(--jt-red); margin: 0; font-size: 28px; font-weight: 900; letter-spacing: -1px; }
        .user-pill { background: #1e293b; color: white; padding: 8px 15px; border-radius: 50px; font-size: 12px; display: flex; align-items: center; gap: 8px; }

        /* Upload Cards */
        .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .card { border: 2px dashed #e2e8f0; padding: 25px; border-radius: 20px; cursor: pointer; background: #fff; transition: 0.3s; }
        .card:hover { border-color: var(--jt-red); background: #fef2f2; }
        .card.active { border-color: #22c55e; background: #f0fdf4; border-style: solid; }
        .card b { display: block; margin-bottom: 5px; font-size: 14px; }

        /* Barcode Table */
        .table-wrap { background: white; border-radius: 16px; overflow: hidden; border: 1px solid #f1f5f9; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #f8fafc; padding: 12px 20px; font-size: 11px; color: #64748b; text-transform: uppercase; }
        td { padding: 12px 20px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
        .barcode-svg { width: 120px; height: 40px; }
        .shipper-tag { background: #fee2e2; color: var(--jt-red); padding: 4px 10px; border-radius: 6px; font-weight: 800; font-size: 13px; }

        /* Stats & Search */
        .controls { display: flex; gap: 10px; margin: 20px 0; }
        .search-box { flex: 1; padding: 12px 20px; border-radius: 12px; border: 1px solid #e2e8f0; outline: none; }
        .btn { padding: 12px 20px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-red { background: var(--jt-red); color: white; }

        /* Footer & QR */
        .footer { margin-top: 40px; border-top: 1px solid #eee; padding-top: 25px; }
        .qr-box { background: #f8fafc; padding: 20px; border-radius: 20px; display: inline-flex; align-items: center; gap: 20px; margin-top: 10px; }
        
        /* In nhãn kiểm kho */
        @media print {
            .card, .header, .controls, .footer, .instruction, #login-section { display: none !important; }
            .container { box-shadow: none; padding: 0; max-width: 100%; }
            .barcode-svg { width: 200px !important; height: 80px !important; }
            td { padding: 20px; border: 1px solid #eee; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo"><h1>J&T EXPRESS <span>PRO</span></h1></div>
        <div id="user-area" style="display:none;"><div class="user-pill"><span id="u-mail">...</span></div></div>
    </div>

    <div id="login-section" style="padding: 50px 0;">
        <center><div id="g_id_onload" data-client_id="850864834737-40v7posjfcq42avv71jv6f38u5tip2fq.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div><div class="g_id_signin" data-type="standard"></div></center>
    </div>

    <div id="tool-section" style="display:none;">
        <div class="upload-grid">
            <div class="card" id="c-dm" onclick="document.getElementById('i-dm').click()">
                <b>1. DANH MỤC KIỂM KHO 📂</b>
                <small id="t-dm">Nạp Excel: Mã-Khu-Tên</small>
                <input type="file" id="i-dm" hidden onchange="loadDM(event)">
            </div>
            <div class="card" id="c-data" onclick="document.getElementById('i-data').click()">
                <b>2. FILE JMS ĐƠN HÀNG 📄</b>
                <small id="t-data">Nạp Excel xuất từ hệ thống</small>
                <input type="file" id="i-data" hidden onchange="loadJMS(event)">
            </div>
        </div>

        <div class="controls" id="ctrl" style="display:none;">
            <input type="text" class="search-box" id="search" placeholder="🔍 Quét mã hoặc tìm shipper..." onkeyup="filter()">
            <button class="btn btn-red" onclick="window.print()">🖨️ IN NHÃN KIỂM KHO</button>
        </div>

        <div class="table-wrap"><div id="res"></div></div>
    </div>

    <div class="footer">
        <div class="qr-box">
            <img src="qr.png" style="width:120px; border-radius:10px;">
            <div style="text-align:left;">
                <b style="color:var(--jt-red);">GIA HẠN SAAS 2025</b>
                <p style="margin:5px 0; font-size:12px;">Nội dung CK: <span style="background:#ff0; font-weight:bold;">Tên Email của bạn</span></p>
                <small style="color:#888;">Hệ thống tự động kích hoạt sau khi nhận tiền.</small>
            </div>
        </div>
    </div>
</div>

<script>
    const AUTH_URL = "https://script.google.com/macros/s/AKfycbwukwW0tEYoW3j9RTKnkRXnOdNwkA9Yi6RdpdEBE7IjAbzOtswd-dVP1lGJaRNOXIwA/exec";
    let DB = {}; let LIST = [];

    function handleCredentialResponse(r) {
        const p = JSON.parse(atob(r.credential.split('.')[1]));
        fetch(`${AUTH_URL}?action=checkAuth&email=${p.email}`).then(res => res.json()).then(d => {
            if(d.status === "success") {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('tool-section').style.display = 'block';
                document.getElementById('user-area').style.display = 'block';
                document.getElementById('u-mail').innerText = p.email;
            } else { alert("Hết hạn dùng!"); }
        });
    }

    function loadDM(e) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(e.target.result), {type: 'array'}).Sheets[XLSX.read(new Uint8Array(e.target.result), {type: 'array'}).SheetNames[0]], {header: 1});
            DB = {};
            data.slice(1).forEach(r => { if(r[0]) DB[r[0].toString().trim()] = { k: r[1], t: r[2] }; });
            document.getElementById('c-dm').classList.add('active');
            document.getElementById('t-dm').innerText = "✅ Đã nạp " + Object.keys(DB).length + " bưu cục";
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    }

    function loadJMS(e) {
        if(Object.keys(DB).length === 0) { alert("Nạp file danh mục trước ní ơi!"); return; }
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(e.target.result), {type: 'array'}).Sheets[XLSX.read(new Uint8Array(e.target.result), {type: 'array'}).SheetNames[0]], {header: 1});
            LIST = [];
            data.slice(1).forEach(row => {
                let code = row.find(c => c && c.toString().length >= 10);
                if(code) {
                    let d3 = code.toString().slice(-3);
                    let info = DB[d3] || { k: "Lạ", t: "Chưa rõ" };
                    LIST.push({ code: code.toString(), khu: info.k, ten: info.t });
                }
            });
            render(LIST);
            document.getElementById('ctrl').style.display = 'flex';
            document.getElementById('c-data').classList.add('active');
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    }

    function render(data) {
        let h = `<table><thead><tr><th>Mã Vạch Kiểm Kho</th><th>Thông tin đơn</th><th>Shipper</th></tr></thead><tbody>`;
        data.forEach((item, idx) => {
            h += `<tr>
                <td><svg id="barcode-${idx}"></svg></td>
                <td><small style="color:#888">Mã:</small> <b>...${item.code.slice(-6)}</b><br><small>Khu:</small> ${item.khu}</td>
                <td><span class="shipper-tag">${item.ten}</span></td>
            </tr>`;
        });
        document.getElementById('res').innerHTML = h + "</tbody></table>";
        // Vẽ mã vạch sau khi tạo bảng
        data.forEach((item, idx) => {
            JsBarcode(`#barcode-${idx}`, item.code, { format: "CODE128", width: 1.5, height: 40, displayValue: false, margin: 0 });
        });
    }

    function filter() {
        let v = document.getElementById('search').value.toLowerCase();
        let f = LIST.filter(i => i.code.includes(v) || i.ten.toLowerCase().includes(v) || i.khu.toLowerCase().includes(v));
        render(f);
    }
</script>
</body>
</html>
